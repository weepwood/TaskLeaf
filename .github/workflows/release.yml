name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle --no-daemon --stacktrace assembleDebug

      - name: Prepare release APK
        run: cp app/build/outputs/apk/debug/app-debug.apk "TaskLeaf-${GITHUB_REF_NAME:-manual}-debug.apk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskleaf-release-apk
          path: TaskLeaf-*-debug.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: TaskLeaf-${{ github.ref_name }}-debug.apk
          generate_release_notes: true
