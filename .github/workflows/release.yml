name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - run: gradle assembleDebug
      - run: cp app/build/outputs/apk/debug/app-debug.apk TaskLeaf-${{ github.ref_name }}-debug.apk
      - uses: softprops/action-gh-release@v2
        with:
          files: TaskLeaf-${{ github.ref_name }}-debug.apk
          generate_release_notes: true
